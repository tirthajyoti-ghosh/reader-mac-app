<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reader</title>

<!-- The deliverable stylesheet (single source of truth) + KaTeX + hljs mapping -->
<link rel="stylesheet" href="./design-tokens.css">
<link rel="stylesheet" href="./vendor/katex/katex.min.css">
<link rel="stylesheet" href="./hljs-tokens.css">

<style>
  /* Bundled OFL fonts — woff2 only, so the render is identical everywhere,
     including the sandboxed (no-network) Quick Look extension. */
  @font-face {
    font-family: "Source Sans 3"; font-style: normal; font-weight: 400;
    font-display: swap; src: url("./fonts/SourceSans3-Regular.woff2") format("woff2");
  }
  @font-face {
    font-family: "Source Sans 3"; font-style: italic; font-weight: 400;
    font-display: swap; src: url("./fonts/SourceSans3-Italic.woff2") format("woff2");
  }
  @font-face {
    font-family: "Source Sans 3"; font-style: normal; font-weight: 600;
    font-display: swap; src: url("./fonts/SourceSans3-SemiBold.woff2") format("woff2");
  }
  @font-face {
    font-family: "Source Sans 3"; font-style: normal; font-weight: 700;
    font-display: swap; src: url("./fonts/SourceSans3-Bold.woff2") format("woff2");
  }
  @font-face {
    font-family: "JetBrains Mono"; font-style: normal; font-weight: 400;
    font-display: swap; src: url("./fonts/JetBrainsMono-Regular.woff2") format("woff2");
  }
  @font-face {
    font-family: "JetBrains Mono"; font-style: normal; font-weight: 700;
    font-display: swap; src: url("./fonts/JetBrainsMono-Bold.woff2") format("woff2");
  }

  /* page shell (from the comps) */
  html, body { height: 100%; margin: 0; background: var(--bg); }
  .rdr { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .scroll { flex: 1; overflow-y: auto; position: relative; }
  .md { font-optical-sizing: auto; }
  ::selection { background: var(--accent-soft); }
  /* keep KaTeX inheriting our text color rather than its own */
  .md .katex { color: var(--text); }

  /* mermaid render-failure fallback: show the source + reason, not an error box */
  .md .mermaid-fallback {
    margin: 1.4em 0;
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
    background: var(--code-bg);
  }
  .md .mermaid-fallback-head {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-family: var(--ui); font-size: 12.5px;
  }
  .md .mermaid-fallback-head svg { color: var(--muted); flex: none; }
  .md .mermaid-fallback-head .mf-label { color: var(--text-2); font-weight: 600; }
  .md .mermaid-fallback-head .mf-err {
    margin-left: 2px; color: var(--muted);
    font-family: var(--mono); font-size: 11.5px;
  }
  .md .mermaid-fallback pre {
    margin: 0; border: 0; border-radius: 0; background: transparent;
  }
</style>
</head>
<body>
  <div class="rdr">
    <div class="reading-progress" id="progress"><i></i></div>
    <div class="scroll" id="scroll">
      <article class="md" id="doc"></article>
    </div>
  </div>

  <!-- vendored, offline. Mermaid (2.5 MB) + KaTeX are loaded on demand by app.js,
       only for documents that actually use them — keeps every render snappy. -->
  <script src="./vendor/markdown-it.min.js"></script>
  <script src="./vendor/highlight.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
