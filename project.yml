name: Reader

options:
  bundleIdPrefix: com.tirthajyoti
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Local-only ad-hoc signing (no Apple Developer team required).
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "YES"
    CODE_SIGNING_ALLOWED: "YES"
    ENABLE_HARDENED_RUNTIME: "NO"

targets:
  Reader:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: WebResources
        type: folder            # folder reference → ./vendor and ./fonts survive intact
      - path: Reader.icns       # app icon (regenerate with scripts/make-icon.sh)
    settings:
      base:
        PRODUCT_NAME: Reader
        PRODUCT_BUNDLE_IDENTIFIER: com.tirthajyoti.Reader
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: Reader.entitlements
    dependencies:
      - target: QuickLookExtension
        embed: true

  QuickLookExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: QuickLook
      - path: WebResources
        type: folder            # same renderer bundled into the .appex (no network in QL)
    settings:
      base:
        PRODUCT_NAME: QuickLookExtension
        PRODUCT_BUNDLE_IDENTIFIER: com.tirthajyoti.Reader.QuickLook
        INFOPLIST_FILE: QuickLook/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: QuickLook/QuickLook.entitlements
